name: offset
on:
  push:
    branches: [ "main" ]

jobs:
    Test_InvestmentAccount:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 24
            
        - name: Test_InvestmentAccount
          run: |
            npm install
            timeout 320m node offset.js --job Test_InvestmentAccount
  
