      runs-on: ubuntu-latest
      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.9'
          
        - name: Install Dependencies
          run: pip install -r requirements.txt || true
          
        - name: Run Audit_Industrial
