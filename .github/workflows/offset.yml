name: offset
on:
  push:
    branches: [ "main" ]

jobs:
    Review_SavingsAccount:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 22
            
        - name: Review_SavingsAccount
          run: |
            npm install
            timeout 344m node offset.js --job Review_SavingsAccount
  
