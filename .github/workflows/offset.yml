name: offset
on:
  push:
    branches: [ "main" ]

jobs:
    Audit_CreditCardAccount:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 22
            
        - name: Audit_CreditCardAccount
          run: |
            npm install
            timeout 301m node offset.js --job Audit_CreditCardAccount
  
