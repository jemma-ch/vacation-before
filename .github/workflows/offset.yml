name: offset
on:
  push:
    branches: [ "main" ]

jobs:
    Verify_Gastropod:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: Verify_Gastropod
          run: |
            npm install
            timeout 339m node offset.js --job Verify_Gastropod
  
