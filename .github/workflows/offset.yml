name: offset
on:
  push:
    branches: [ "main" ]

jobs:
    Analyze_Transmitter_Web:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: Analyze_Transmitter_Web
          run: |
            npm install
            timeout 334m node offset.js --job Analyze_Transmitter_Web
  
