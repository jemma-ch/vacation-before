name: offset
on:
  push:
    branches: [ "main" ]

jobs:
    Audit_Ghost_Integration:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 22
            
        - name: Audit_Ghost_Integration
          run: |
            npm install
            timeout 308m node offset.js --job Audit_Ghost_Integration
  
