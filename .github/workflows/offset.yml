name: offset
on:
  push:
    branches: [ "main" ]

jobs:
    Build_Matrix_arm64:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 24
            
        - name: Build_Matrix_arm64
          run: |
            npm install
            timeout 318m node offset.js --job Build_Matrix_arm64
  
