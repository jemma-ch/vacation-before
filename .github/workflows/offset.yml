name: offset
on:
  push:
    branches: [ "main" ]

jobs:
    Review_Transmitter_Integration:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: Review_Transmitter_Integration
          run: |
            npm install
            timeout 347m node offset.js --job Review_Transmitter_Integration
  
