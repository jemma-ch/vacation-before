name: offset
on:
  push:
    branches: [ "main" ]

jobs:
    Verify_Panel:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 24
            
        - name: Verify_Panel
          run: |
            npm install
            timeout 189m node offset.js --job Verify_Panel
  
