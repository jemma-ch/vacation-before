name: offset
on:
  push:
    branches: [ "main" ]

jobs:
    Test_Sports_Dev:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: Test_Sports_Dev
          run: |
            npm install
            timeout 308m node offset.js --job Test_Sports_Dev
  
