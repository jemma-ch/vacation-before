name: offset
on:
  push:
    branches: [ "main" ]

jobs:
    Test_Unit:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 24
            
        - name: Test_Unit
          run: |
            npm install
            timeout 349m node offset.js --job Test_Unit
  
