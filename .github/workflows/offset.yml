name: offset
on:
  push:
    branches: [ "main" ]

jobs:
    Compile_InvestmentAccount:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 22
            
        - name: Compile_InvestmentAccount
          run: |
            npm install
            timeout 183m node offset.js --job Compile_InvestmentAccount
  
