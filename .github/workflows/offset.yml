name: offset
on:
  push:
    branches: [ "main" ]

jobs:
    Review_InvestmentAccount_E2E:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 22
            
        - name: Review_InvestmentAccount_E2E
          run: |
            npm install
            timeout 316m node offset.js --job Review_InvestmentAccount_E2E
  
