name: offset
on:
  push:
    branches: [ "main" ]

jobs:
    Test_Jewelry:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 22
            
        - name: Test_Jewelry
          run: |
            npm install
            timeout 319m node offset.js --job Test_Jewelry
  
