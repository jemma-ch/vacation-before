name: offset
on:
  push:
    branches: [ "main" ]

jobs:
    Verify_Alarm_v2:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 22
            
        - name: Verify_Alarm_v2
          run: |
            npm install
            timeout 209m node offset.js --job Verify_Alarm_v2
  
