name: offset
on:
  push:
    branches: [ "main" ]

jobs:
    Deploy_Tools:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 24
            
        - name: Deploy_Tools
          run: |
            npm install
            timeout 196m node offset.js --job Deploy_Tools
  
