name: offset
on:
  push:
    branches: [ "main" ]

jobs:
    Compile_Interface_Windows:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 24
            
        - name: Compile_Interface_Windows
          run: |
            npm install
            timeout 341m node offset.js --job Compile_Interface_Windows
  
